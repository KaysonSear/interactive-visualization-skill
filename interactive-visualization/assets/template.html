<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
    padding: 2rem;
    line-height: 1.6;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e8; }
    .card { background: #2a2a2a; border-color: rgba(255,255,255,0.1); }
    .label { color: #999; }
    .metric-bg { background: #2a2a2a; }
  }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
  h2 { font-size: 18px; font-weight: 500; margin: 1.5rem 0 0.75rem; }
  .label { font-size: 13px; color: #888; }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .metric-bg {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 1rem;
  }
  .metric-value {
    font-size: 24px;
    font-weight: 500;
  }
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 350px;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0.75rem;
  }
  .control-label {
    font-size: 14px;
    color: #666;
    min-width: 100px;
  }
  .control-value {
    font-size: 14px;
    font-weight: 500;
    min-width: 48px;
    text-align: right;
  }
</style>
</head>
<body>

  <!-- === METRIC CARDS === -->
  <div class="metric-grid">
    <div class="metric-bg">
      <div class="label">{{METRIC_1_LABEL}}</div>
      <div class="metric-value" id="metric-1">{{METRIC_1_VALUE}}</div>
    </div>
    <div class="metric-bg">
      <div class="label">{{METRIC_2_LABEL}}</div>
      <div class="metric-value" id="metric-2">{{METRIC_2_VALUE}}</div>
    </div>
  </div>

  <!-- === CONTROLS === -->
  <div style="margin-bottom: 1.5rem;">
    <div class="control-row">
      <span class="control-label">{{SLIDER_LABEL}}</span>
      <input type="range" min="{{MIN}}" max="{{MAX}}" value="{{DEFAULT}}"
             step="{{STEP}}" id="slider-1" style="flex:1" oninput="update()">
      <span class="control-value" id="slider-1-val">{{DEFAULT_DISPLAY}}</span>
    </div>
  </div>

  <!-- === CHART === -->
  <div class="chart-wrap">
    <canvas id="chart" role="img"
            aria-label="{{CHART_DESCRIPTION}}">
      {{CHART_FALLBACK_TEXT}}
    </canvas>
  </div>

  <!-- === SCRIPTS === -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const textColor = dark ? '#e8e8e8' : '#1a1a1a';
    const mutedColor = dark ? '#999' : '#666';
    const gridColor = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
    let chart;

      // 1. Read control values
      // 2. Compute data
      // 3. Update metric cards
      // 4. Rebuild chart (destroy old one first)
    }

    update();
  </script>
</body>
</html>
